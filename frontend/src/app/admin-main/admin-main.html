<div class="admin-layout">
  <!-- Sidebar Navigation -->
  <nav class="admin-sidebar">
    <!-- Logo Section -->
    <div class="sidebar-header">
      <img src="/Logo_9awi_Niveau.png" 
           alt="9awiNiveau" 
           class="sidebar-logo"
           (error)="onImageError($event)">
      <div class="sidebar-title">
        <span>Administration</span>
      </div>
    </div>

    <!-- Navigation Menu -->
    <div class="nav-section">
      <ul class="nav-menu">
        <li>
          <a (click)="navigateTo('/admin/dashboard')" 
             [class.active]="currentRoute === '/admin/dashboard'"
             class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a (click)="navigateTo('/admin/users')" 
             [class.active]="currentRoute.includes('/admin/users')"
             class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Utilisateurs</span>
          </a>
        </li>
        <li>
          <a (click)="navigateTo('/admin/gamification')" 
             [class.active]="currentRoute.includes('/admin/gamification')"
             class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"></polygon>
            </svg>
            <span>Gamification</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- User Section -->
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <span>{{ getUserInitials() }}</span>
        </div>
        <div class="user-details">
          <span class="user-name">Administrateur</span>
          <span class="user-email">{{ authService.getEmail() }}</span>
        </div>
      </div>
      <button (click)="logout()" class="logout-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16,17 21,12 16,7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Déconnexion
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>
</div>
