<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-gray-900">Tableau de bord Formateur</h1>
      <button (click)="logout()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
        Déconnexion
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <!-- Actions -->
    <div class="mb-6">
      <a routerLink="/cours/nouveau" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 inline-block">
        + Ajouter un cours
      </a>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="mb-4 p-4 bg-red-100 text-red-700 rounded">
      {{ error }}
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-8">
      <p class="text-gray-600">Chargement...</p>
    </div>

    <!-- Cours List -->
    <div *ngIf="!loading" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <div *ngFor="let c of cours" class="bg-white rounded-lg shadow p-6">
        <h3 class="text-xl font-semibold mb-2">{{ c.titre }}</h3>
        <p class="text-gray-600 mb-4">{{ c.description }}</p>
        <div class="flex gap-2">
          <a [routerLink]="['/cours/modifier', c.id]" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600">
            Modifier
          </a>
          <button (click)="archiveCours(c.id!)" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
            Archiver
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && cours.length === 0" class="text-center py-12">
      <p class="text-gray-600 text-lg">Aucun cours pour le moment</p>
      <a routerLink="/cours/nouveau" class="mt-4 inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        Créer votre premier cours
      </a>
    </div>
  </main>
</div>
