<div id="vanta-bg" class="fixed inset-0 z-0">
  <div class="particle w-4 h-4 top-10 left-10"></div>
  <div class="particle w-6 h-6 top-1/3 left-1/4"></div>
  <div class="particle w-8 h-8 top-2/3 right-1/4"></div>
  <div class="particle w-5 h-5 bottom-20 left-1/2"></div>
  <div class="particle w-7 h-7 bottom-10 right-10"></div>
</div>

<div class="relative z-10 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center">
          <div class="w-10 h-10 rounded-lg bg-primary-500 flex items-center justify-center mr-3">
            <i data-feather="book" class="text-white" width="20" height="20"></i>
          </div>
          <h1 class="text-2xl font-bold text-primary-500">9awiNiveau</h1>
        </div>
        <button (click)="logout()" class="btn-hover-effect flex items-center gap-2 px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-500 hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all">
          <i data-feather="log-out" width="18" height="18"></i>
          Déconnexion
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12">
      <div class="flex items-center mb-8">
        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center mr-4">
          <i data-feather="user" class="text-white" width="32" height="32"></i>
        </div>
        <div>
          <h2 class="text-3xl font-bold text-gray-900">Bonjour, <span class="text-primary-500">{{ username }}</span> !</h2>
          <p class="text-gray-600 mt-1">Bienvenue dans votre espace sécurisé</p>
        </div>
      </div>

      <div class="border-t border-gray-200 pt-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Card 1 -->
          <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <div class="w-12 h-12 rounded-lg bg-blue-500 flex items-center justify-center mb-4">
              <i data-feather="book-open" class="text-white" width="24" height="24"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Mes cours</h3>
            <p class="text-gray-600 text-sm">Accédez à vos cours et continuez votre apprentissage</p>
          </div>

          <!-- Card 2 -->
          <div class="bg-gradient-to-br from-green-50 to-green-100 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <div class="w-12 h-12 rounded-lg bg-green-500 flex items-center justify-center mb-4">
              <i data-feather="award" class="text-white" width="24" height="24"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Progression</h3>
            <p class="text-gray-600 text-sm">Suivez vos progrès et vos réussites</p>
          </div>

          <!-- Card 3 -->
          <div class="bg-gradient-to-br from-purple-50 to-purple-100 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <div class="w-12 h-12 rounded-lg bg-purple-500 flex items-center justify-center mb-4">
              <i data-feather="settings" class="text-white" width="24" height="24"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Paramètres</h3>
            <p class="text-gray-600 text-sm">Personnalisez votre expérience d'apprentissage</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
