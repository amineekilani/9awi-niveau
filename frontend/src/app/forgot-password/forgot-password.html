<div class="forgot-password-container">
  <div class="forgot-password-card">
    <h2>Mot de passe oublié ?</h2>
    <p class="subtitle">Entrez votre email pour recevoir un lien de réinitialisation</p>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="votre@email.com"
          [disabled]="isLoading"
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="!forgotForm.valid || isLoading" class="btn-submit">
        <span *ngIf="!isLoading">Envoyer le lien</span>
        <span *ngIf="isLoading">Envoi en cours...</span>
      </button>
    </form>

    <div class="back-to-login">
      <a routerLink="/login">← Retour à la connexion</a>
    </div>
  </div>
</div>
