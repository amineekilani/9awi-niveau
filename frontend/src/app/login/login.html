<!-- Fond bleu moderne avec vagues animées -->
<div class="fixed inset-0 z-0 bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-600 overflow-hidden">
  <!-- Vagues animées -->
  <div class="absolute inset-0">
    <svg class="absolute bottom-0 w-full h-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path class="wave-animation" fill="rgba(255, 255, 255, 0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,101.3C1248,85,1344,75,1392,69.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="absolute bottom-0 w-full h-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path class="wave-animation-delay" fill="rgba(255, 255, 255, 0.03)" d="M0,192L48,197.3C96,203,192,213,288,192C384,171,480,117,576,112C672,107,768,149,864,165.3C960,181,1056,171,1152,154.7C1248,139,1344,117,1392,106.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
  </div>
  
  <!-- Particules flottantes -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-2 h-2 bg-white rounded-full opacity-40 animate-float-slow"></div>
    <div class="absolute top-40 right-20 w-3 h-3 bg-white rounded-full opacity-30 animate-float-slow animation-delay-1s"></div>
    <div class="absolute top-60 left-1/4 w-2 h-2 bg-white rounded-full opacity-50 animate-float-slow animation-delay-2s"></div>
    <div class="absolute bottom-40 right-1/3 w-3 h-3 bg-white rounded-full opacity-40 animate-float-slow animation-delay-3s"></div>
    <div class="absolute bottom-60 left-1/3 w-2 h-2 bg-white rounded-full opacity-30 animate-float-slow animation-delay-4s"></div>
    <div class="absolute top-1/3 right-1/4 w-2 h-2 bg-white rounded-full opacity-50 animate-float-slow animation-delay-5s"></div>
  </div>
  
  <!-- Grille subtile -->
  <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px); background-size: 50px 50px;"></div>
</div>

<!-- Styles pour les animations -->
<style>
  @keyframes wave {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(-25px) translateY(-10px); }
  }
  
  @keyframes float-slow {
    0%, 100% { transform: translateY(0px); opacity: 0.4; }
    50% { transform: translateY(-30px); opacity: 0.8; }
  }
  
  .wave-animation {
    animation: wave 15s ease-in-out infinite;
    transform-origin: center;
  }
  
  .wave-animation-delay {
    animation: wave 20s ease-in-out infinite;
    animation-delay: -5s;
    transform-origin: center;
  }
  
  .animate-float-slow {
    animation: float-slow 8s ease-in-out infinite;
  }
  
  .animation-delay-1s { animation-delay: 1s; }
  .animation-delay-2s { animation-delay: 2s; }
  .animation-delay-3s { animation-delay: 3s; }
  .animation-delay-4s { animation-delay: 4s; }
  .animation-delay-5s { animation-delay: 5s; }
</style>

<div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-6xl bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
  <!-- Colonne gauche - Illustration -->
  <div class="hidden md:block w-full md:w-1/2 bg-gradient-to-br from-primary-500 to-primary-700 relative overflow-hidden">
    <img src="login.jpg" alt="Illustration de connexion" class="w-full h-full object-cover absolute inset-0">
  </div>

  <!-- Colonne droite - Formulaire -->
  <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
    <div class="flex items-center justify-center mb-8">
      <img src="Logo_9awi_Niveau.png" alt="Logo 9awi Niveau" class="h-32 w-auto">
    </div>

    <div class="mb-8">
      <h2 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">
        Bienvenue à nouveau !
      </h2>
      <p class="text-gray-600">Connectez-vous pour continuer votre progression.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="mail" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="email"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="votre@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="lock" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="password"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-500 focus:ring-primary-500 border-gray-300 rounded">
          <label for="remember-me" class="ml-2 block text-sm text-gray-700">Se souvenir de moi</label>
        </div>
        <a routerLink="/forgot-password" class="text-sm font-medium text-primary-500 hover:text-primary-700">Mot de passe oublié ?</a>
      </div>

      <div *ngIf="error" class="p-4 mb-4 bg-red-50 border border-red-200 rounded-lg flex items-start">
        <i data-feather="alert-circle" class="text-red-500 mr-3 flex-shrink-0" width="20" height="20"></i>
        <p class="text-sm text-red-700">{{ error }}</p>
      </div>

      <button type="submit" class="btn-hover-effect w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
        Se connecter
      </button>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">Ou continuer avec</span>
        </div>
      </div>

      <div class="mt-6">
        <div id="google-signin-button" class="w-full"></div>
      </div>
    </div>

    <div class="mt-8 text-center text-sm text-gray-600">
      Pas encore de compte ?
      <a routerLink="/register" class="font-medium text-primary-500 hover:text-primary-700">Créer un compte</a>
    </div>
  </div>
  </div>
</div>
