<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h3 class="card-title text-center">Connexion</h3>
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Nom d'utilisateur"
                [(ngModel)]="username"
                name="username"
                required
              />
            </div>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                placeholder="Mot de passe"
                [(ngModel)]="password"
                name="password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
          </form>
          <p class="text-center mt-3">
  Pas de compte ? <a routerLink="/register">S'inscrire</a>
</p>
          <p class="text-center mt-3 text-danger">{{ error }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
