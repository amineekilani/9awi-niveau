<div id="vanta-bg" class="fixed inset-0 z-0">
  <div class="particle w-4 h-4 top-10 left-10"></div>
  <div class="particle w-6 h-6 top-1/3 left-1/4"></div>
  <div class="particle w-8 h-8 top-2/3 right-1/4"></div>
  <div class="particle w-5 h-5 bottom-20 left-1/2"></div>
  <div class="particle w-7 h-7 bottom-10 right-10"></div>
</div>

<div class="relative z-10 w-full max-w-6xl bg-white rounded-2xl overflow-hidden shadow-xl flex flex-col md:flex-row mx-auto mt-10">
  <!-- Colonne gauche - Illustration -->
  <div class="hidden md:block w-full md:w-1/2 bg-gradient-to-br from-primary-500 to-primary-700 relative overflow-hidden">
    <img src="register.jpg" alt="Illustration d'inscription" class="w-full h-full object-cover absolute inset-0">
    <div class="absolute top-0 left-0 w-32 h-32 rounded-full bg-white/10 -translate-x-16 -translate-y-16 animate-pulse-slow"></div>
    <div class="absolute bottom-0 right-0 w-48 h-48 rounded-full bg-white/10 translate-x-24 translate-y-24 animate-pulse-slow"></div>
    <div class="absolute top-1/3 right-1/4 w-16 h-16 rounded-full bg-white/20 animate-pulse-slow"></div>
  </div>

  <!-- Colonne droite - Formulaire -->
  <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
    <div class="flex items-center mb-6">
      <div class="w-12 h-12 rounded-lg bg-primary-500 flex items-center justify-center mr-4">
        <i data-feather="book" class="text-white" width="24" height="24"></i>
      </div>
      <h1 class="text-3xl font-bold text-primary-500">9awiNiveau</h1>
    </div>

    <div class="mb-8">
      <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">Créer un compte</h2>
      <p class="text-gray-600">Rejoignez-nous pour commencer votre apprentissage.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Nom d'utilisateur</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="user" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="text"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="Nom d'utilisateur"
            [(ngModel)]="username"
            name="username"
            required
            minlength="3"
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="mail" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="email"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="votre@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="lock" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="password"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
            minlength="6"
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Confirmer le mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="lock" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="password"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="••••••••"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-hover-effect w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
        S'inscrire
      </button>

      <p class="text-center text-red-500 font-medium" *ngIf="error">{{ error }}</p>
      <p class="text-center text-green-500 font-medium" *ngIf="success">{{ success }}</p>
    </form>

    <div class="mt-8 text-center text-sm text-gray-600">
      Déjà un compte ?
      <a routerLink="/login" class="font-medium text-primary-500 hover:text-primary-700">Se connecter</a>
    </div>
  </div>
</div>
