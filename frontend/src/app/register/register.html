<div id="vanta-bg" class="fixed inset-0 z-0">
  <div class="particle w-4 h-4 top-10 left-10"></div>
  <div class="particle w-6 h-6 top-1/3 left-1/4"></div>
  <div class="particle w-8 h-8 top-2/3 right-1/4"></div>
  <div class="particle w-5 h-5 bottom-20 left-1/2"></div>
  <div class="particle w-7 h-7 bottom-10 right-10"></div>
</div>

<div class="relative z-10 w-full max-w-6xl bg-white rounded-2xl overflow-hidden shadow-xl flex flex-col md:flex-row mx-auto mt-10">
  <!-- Colonne gauche - Illustration -->
  <div class="hidden md:block w-full md:w-1/2 bg-gradient-to-br from-primary-500 to-primary-700 relative overflow-hidden">
    <img src="login.jpg" alt="Illustration d'inscription" class="w-full h-full object-cover absolute inset-0">
    <div class="absolute top-0 left-0 w-32 h-32 rounded-full bg-white/10 -translate-x-16 -translate-y-16 animate-pulse-slow"></div>
    <div class="absolute bottom-0 right-0 w-48 h-48 rounded-full bg-white/10 translate-x-24 translate-y-24 animate-pulse-slow"></div>
    <div class="absolute top-1/3 right-1/4 w-16 h-16 rounded-full bg-white/20 animate-pulse-slow"></div>
  </div>

  <!-- Colonne droite - Formulaire -->
  <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
    <div class="flex items-center mb-6">
      <div class="w-12 h-12 rounded-lg bg-primary-500 flex items-center justify-center mr-4">
        <i data-feather="book" class="text-white" width="24" height="24"></i>
      </div>
      <h1 class="text-3xl font-bold text-primary-500">9awi Niveau</h1>
    </div>

    <div class="mb-8">
      <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">Créer un compte</h2>
      <p class="text-gray-600">Rejoignez-nous pour commencer votre apprentissage.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-sm font-medium text-gray-700">Prénom</label>
          <input
            type="text"
            class="input-focus-effect block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="Prénom"
            [(ngModel)]="firstName"
            name="firstName"
            required
          />
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-gray-700">Nom</label>
          <input
            type="text"
            class="input-focus-effect block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="Nom"
            [(ngModel)]="lastName"
            name="lastName"
            required
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Date de naissance</label>
        <input
          type="date"
          class="input-focus-effect block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
          [(ngModel)]="dateOfBirth"
          name="dateOfBirth"
          required
        />
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Numéro de téléphone</label>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center px-3 py-2 bg-gray-100 rounded-lg text-sm font-medium">+216</span>
          <input
            type="text"
            class="input-focus-effect block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="12345678"
            [(ngModel)]="phoneNumberSuffix"
            name="phoneNumberSuffix"
            pattern="^\\d{8}$"
            required
          />
        </div>
        <p class="text-xs text-gray-500">Entrez 8 chiffres (ex: 12345678)</p>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Photo de profil (optionnel)</label>
        <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-primary-500 transition-colors cursor-pointer" (click)="fileInput.click()">
          <input
            #fileInput
            type="file"
            class="hidden"
            accept="image/*"
            (change)="onProfileImageSelected($event)"
            name="profileImage"
          />
          <div *ngIf="!profileImagePreview" class="flex flex-col items-center">
            <i data-feather="image" class="text-gray-400 mb-2" width="32" height="32"></i>
            <p class="text-sm text-gray-600">Cliquez ou glissez une image</p>
            <p class="text-xs text-gray-500">PNG, JPG, GIF (max 10MB)</p>
          </div>
          <div *ngIf="profileImagePreview" class="flex flex-col items-center">
            <img [src]="profileImagePreview" class="h-20 w-20 object-cover rounded-lg mb-2" />
            <p class="text-sm text-gray-600">{{ selectedImageFile?.name }}</p>
            <p class="text-xs text-primary-500 cursor-pointer mt-1" (click)="clearProfileImage($event)">Supprimer</p>
          </div>
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="mail" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="email"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="votre@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="lock" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="password"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
            minlength="6"
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-gray-700">Confirmer le mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="lock" class="text-gray-400" width="18" height="18"></i>
          </div>
          <input
            type="password"
            class="input-focus-effect pl-10 block w-full rounded-lg border-gray-300 shadow-sm focus:ring-primary-500 focus:border-primary-500"
            placeholder="••••••••"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-hover-effect w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
        S'inscrire
      </button>

      <p class="text-center text-red-500 font-medium" *ngIf="error">{{ error }}</p>
      <p class="text-center text-green-500 font-medium" *ngIf="success">{{ success }}</p>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">Ou s'inscrire avec</span>
        </div>
      </div>

      <div class="mt-6">
        <div id="google-signup-button" class="w-full"></div>
      </div>
    </div>

    <div class="mt-8 text-center text-sm text-gray-600">
      Déjà un compte ?
      <a routerLink="/login" class="font-medium text-primary-500 hover:text-primary-700">Se connecter</a>
    </div>
  </div>
</div>
