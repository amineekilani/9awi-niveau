<div id="vanta-bg" class="fixed inset-0 z-0">
  <div class="particle w-4 h-4 top-10 left-10"></div>
  <div class="particle w-6 h-6 top-1/3 left-1/4"></div>
  <div class="particle w-8 h-8 top-2/3 right-1/4"></div>
  <div class="particle w-5 h-5 bottom-20 left-1/2"></div>
  <div class="particle w-7 h-7 bottom-10 right-10"></div>
</div>

<div class="relative z-10 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
    <!-- Loading -->
    <div *ngIf="loading" class="text-center">
      <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-2 border-primary-500 mb-4"></div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Suppression en cours...</h2>
      <p class="text-gray-600">Veuillez patienter</p>
    </div>

    <!-- Success -->
    <div *ngIf="success && !loading" class="text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-feather="check" class="text-green-500" width="32" height="32"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Compte supprimé</h2>
      <p class="text-gray-600 mb-6">
        Votre compte a été supprimé avec succès. Vous allez être redirigé vers la page de connexion...
      </p>
      <div class="flex items-center justify-center text-sm text-gray-500">
        <i data-feather="info" width="16" height="16" class="mr-2"></i>
        Redirection automatique dans quelques secondes
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage && !loading" class="text-center">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-feather="x" class="text-red-500" width="32" height="32"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Erreur</h2>
      <p class="text-red-600 mb-6">{{ errorMessage }}</p>
      <button 
        (click)="goToLogin()"
        class="btn-hover-effect w-full px-6 py-3 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition-all"
      >
        Retour à la connexion
      </button>
    </div>
  </div>
</div>
