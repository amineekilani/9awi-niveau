<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
      <h2 class="text-2xl font-bold mb-6">
        {{ isEditMode ? 'Modifier le cours' : 'Nouveau cours' }}
      </h2>

      <!-- Success Message -->
      <div *ngIf="success" class="mb-4 p-4 bg-green-100 text-green-700 rounded">
        {{ success }}
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="mb-4 p-4 bg-red-100 text-red-700 rounded">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()" #coursForm="ngForm">
        <!-- Titre -->
        <div class="mb-4">
          <label for="titre" class="block text-sm font-medium text-gray-700 mb-2">
            Titre du cours *
          </label>
          <input
            type="text"
            id="titre"
            name="titre"
            [(ngModel)]="cours.titre"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: Introduction à Angular"
          />
        </div>

        <!-- Description -->
        <div class="mb-6">
          <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
            Description
          </label>
          <textarea
            id="description"
            name="description"
            [(ngModel)]="cours.description"
            rows="6"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Décrivez le contenu du cours..."
          ></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4">
          <button
            type="submit"
            [disabled]="!coursForm.form.valid || loading"
            class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
          >
            {{ loading ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
          </button>
          <a
            routerLink="/formateur-dashboard"
            class="flex-1 px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 text-center"
          >
            Annuler
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
