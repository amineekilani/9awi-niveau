<div class="reset-password-container">
  <div class="reset-password-card">
    <h2>Nouveau mot de passe</h2>
    <p class="subtitle">Choisissez un nouveau mot de passe sécurisé</p>

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
      <div class="form-group">
        <label for="newPassword">Nouveau mot de passe</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          required
          minlength="6"
          placeholder="Minimum 6 caractères"
          [disabled]="isLoading || !token"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          minlength="6"
          placeholder="Retapez votre mot de passe"
          [disabled]="isLoading || !token"
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="!resetForm.valid || isLoading || !token" class="btn-submit">
        <span *ngIf="!isLoading">Réinitialiser le mot de passe</span>
        <span *ngIf="isLoading">Réinitialisation...</span>
      </button>
    </form>

    <div class="back-to-login">
      <a routerLink="/login">← Retour à la connexion</a>
    </div>
  </div>
</div>
