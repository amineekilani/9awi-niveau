server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend if needed (optional here since we use docker-compose)
    # But usually frontend calls backend via full URL or relative path if proxied.
    # Given app.frontend.url in backend is localhost:4200, we assume browser does direct calls.
    # We will just serve static files here.
}
